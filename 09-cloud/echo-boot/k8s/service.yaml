apiVersion: v1
kind: Service
metadata:
  name: echo-boot
spec:
  type: NodePort              # exposes the service on a port of the minikube node
  selector:
    app: echo-boot            # routes to all pods with this label
  ports:
    - protocol: TCP
      port: 8080              # port on the Service (cluster-internal)
      targetPort: 8080        # port on the Pod
      # nodePort omitted → K8s assigns one automatically (30000-32767)
      # retrieve with: kubectl get svc echo-boot

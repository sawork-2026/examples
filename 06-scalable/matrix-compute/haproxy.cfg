defaults
    mode tcp
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend lb-matrix
    bind *:8080
    default_backend servers

backend servers
    balance roundrobin
    server mc1 host.docker.internal:8081 check
    server mc2 host.docker.internal:8082 check
    server mc3 host.docker.internal:8083 check

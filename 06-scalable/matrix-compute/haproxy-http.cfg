defaults
    mode http
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend lb-matrix
    bind *:8080

    acl is_matrix path_beg /api/matrix
    use_backend matrix_servers if is_matrix
    default_backend matrix_servers

backend matrix_servers
    balance roundrobin
    option httpchk GET /actuator/health
    server mc1 host.docker.internal:8081 check
    server mc2 host.docker.internal:8082 check
    server mc3 host.docker.internal:8083 check

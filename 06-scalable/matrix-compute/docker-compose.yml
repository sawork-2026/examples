version: '3.8'

services:
  mc1:
    image: matrix-compute
    container_name: mc1
    cpus: 1
    mem_limit: 512m
    ports:
      - "8081:8080"

  mc2:
    image: matrix-compute
    container_name: mc2
    cpus: 1
    mem_limit: 512m
    ports:
      - "8082:8080"

  mc3:
    image: matrix-compute
    container_name: mc3
    cpus: 1
    mem_limit: 512m
    ports:
      - "8083:8080"

  haproxy:
    image: haproxy:latest
    container_name: haproxy-lb
    ports:
      - "8080:8080"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - mc1
      - mc2
      - mc3
